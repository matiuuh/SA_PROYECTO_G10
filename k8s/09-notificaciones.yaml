apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones-service
  namespace: quetzaltv-prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: notificaciones-service
  template:
    metadata:
      labels:
        app: notificaciones-service
    spec:
      containers:
        - name: notificaciones-service
          image: $AR_REGISTRY/notificaciones:$VERSION
          ports:
            - containerPort: 8007
            - containerPort: 5007
          env:
            - name: GRPC_PORT
              value: "5007"
            - name: HTTP_PORT
              value: "8007"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: DATABASE_URL_NOTIFICACIONES
            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: EMAIL_USER
            - name: EMAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: EMAIL_PASS
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: EMAIL_FROM
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notificaciones-service
  namespace: quetzaltv-prod
spec:
  selector:
    app: notificaciones-service
  ports:
    - name: http
      port: 8007
      targetPort: 8007
    - name: grpc
      port: 5007
      targetPort: 5007
