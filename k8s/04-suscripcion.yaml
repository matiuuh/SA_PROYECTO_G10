apiVersion: apps/v1
kind: Deployment
metadata:
  name: suscripcion-service
  namespace: quetzaltv-prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: suscripcion-service
  template:
    metadata:
      labels:
        app: suscripcion-service
    spec:
      containers:
        - name: suscripcion-service
          image: $AR_REGISTRY/suscripcion:$VERSION
          ports:
            - containerPort: 8002
            - containerPort: 5002
          env:
            - name: APP_NAME
              value: "suscripcion-service"
            - name: APP_ENV
              value: "production"
            - name: APP_PORT
              value: "8002"
            - name: GRPC_PORT
              value: "5002"
            - name: CONVERSION_TIMEOUT_SECONDS
              value: "3.0"
            - name: STORAGE_BACKEND
              value: "postgres"
            - name: DB_PORT
              value: "5438"
            - name: DB_NAME
              value: "quetzal_suscripcion"
            - name: DB_USER
              value: "postgres"
            - name: API_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: API_GATEWAY_URL
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: DB_HOST
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: JWT_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: suscripcion-service
  namespace: quetzaltv-prod
spec:
  selector:
    app: suscripcion-service
  ports:
    - name: http
      port: 8002
      targetPort: 8002
    - name: grpc
      port: 5002
      targetPort: 5002
