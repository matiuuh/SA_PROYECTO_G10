apiVersion: apps/v1
kind: Deployment
metadata:
  name: usuario-service
  namespace: quetzaltv-prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: usuario-service
  template:
    metadata:
      labels:
        app: usuario-service
    spec:
      containers:
        - name: usuario-service
          image: $AR_REGISTRY/usuario:$VERSION
          ports:
            - containerPort: 8001
            - containerPort: 5001
          env:
            - name: APP_NAME
              value: "usuario-service"
            - name: APP_ENV
              value: "production"
            - name: APP_PORT
              value: "8001"
            - name: GRPC_PORT
              value: "5001"
            - name: NOTIFICATIONS_ENABLED
              value: "true"
            - name: NOTIFICATIONS_TIMEOUT_SECONDS
              value: "3.0"
            - name: STORAGE_BACKEND
              value: "postgres"
            - name: JWT_ALGORITHM
              value: "HS256"
            - name: JWT_EXPIRE_MINUTES
              value: "60"
            - name: DB_PORT
              value: "5437"
            - name: DB_NAME
              value: "quetzal_usuario"
            - name: DB_USER
              value: "postgres"
            - name: API_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: API_GATEWAY_URL
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: DB_HOST
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: JWT_SECRET
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: usuario-service
  namespace: quetzaltv-prod
spec:
  selector:
    app: usuario-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
    - name: grpc
      port: 5001
      targetPort: 5001
