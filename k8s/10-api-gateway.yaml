apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: quetzaltv-prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: $AR_REGISTRY/api-gateway:$VERSION
          ports:
            - containerPort: 80
          env:
            - name: PORT
              value: "80"
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: FRONTEND_URL
            - name: USUARIO_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: USUARIO_SERVICE_URL
            - name: SUSCRIPCION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: SUSCRIPCION_SERVICE_URL
            - name: CATALOGO_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: CATALOGO_SERVICE_URL
            - name: STREAMING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: STREAMING_SERVICE_URL
            - name: COBROS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: COBROS_SERVICE_URL
            - name: DIVISAS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: DIVISAS_SERVICE_URL
            - name: NOTIFICACIONES_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: NOTIFICACIONES_SERVICE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: api-gateway-backend-config
  namespace: quetzaltv-prod
spec:
  timeoutSec: 3600
  connectionDraining:
    drainingTimeoutSec: 60
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: quetzaltv-prod
  annotations:
    cloud.google.com/backend-config: '{"default":"api-gateway-backend-config"}'
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 80
