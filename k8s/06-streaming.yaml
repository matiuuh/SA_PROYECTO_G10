apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-service
  namespace: quetzaltv-prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: streaming-service
  template:
    metadata:
      labels:
        app: streaming-service
    spec:
      serviceAccountName: quetzal-tv-storage-ksa
      containers:
        - name: streaming-service
          image: $AR_REGISTRY/streaming:$VERSION
          ports:
            - containerPort: 8004
            - containerPort: 5004
          env:
            - name: GRPC_PORT
              value: "5004"
            - name: HTTP_PORT
              value: "8004"
            - name: GCS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: GCS_BUCKET
            - name: CATALOGO_API_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: CATALOGO_API_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: DATABASE_URL_STREAMING
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: streaming-service
  namespace: quetzaltv-prod
spec:
  selector:
    app: streaming-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004
    - name: grpc
      port: 5004
      targetPort: 5004
