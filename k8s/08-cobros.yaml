apiVersion: apps/v1
kind: Deployment
metadata:
  name: cobros-service
  namespace: quetzaltv-prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: cobros-service
  template:
    metadata:
      labels:
        app: cobros-service
    spec:
      containers:
        - name: cobros-service
          image: $AR_REGISTRY/cobros:$VERSION
          ports:
            - containerPort: 8006
            - containerPort: 5006
          env:
            - name: GRPC_PORT
              value: "5006"
            - name: HTTP_PORT
              value: "8006"
            - name: DEFAULT_NOTIFICATION_USER_NAME
              value: "Usuario"
            - name: BASE_CURRENCY
              value: "USD"
            - name: API_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: API_GATEWAY_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: quetzaltv-config
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quetzaltv-secrets
                  key: DATABASE_URL_COBROS
          resources:
            requests:
              cpu: 30m
              memory: 48Mi
            limits:
              cpu: 150m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cobros-service
  namespace: quetzaltv-prod
spec:
  selector:
    app: cobros-service
  ports:
    - name: http
      port: 8006
      targetPort: 8006
    - name: grpc
      port: 5006
      targetPort: 5006
