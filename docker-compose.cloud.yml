name: quetzaltv-cloud

# ─── Orquestación completa — un solo host ─────────────────────────────────────
#   Todos los microservicios y sus bases de datos en una sola máquina.
#   Útil para staging, demos, o cuando solo se dispone de una VM grande.
#   Para despliegue distribuido en 3 VMs usar los archivos cloud-vm{1,2,3}.yml.
#
#   Servicio          REST     gRPC    DB (contenedor)
#   ─────────────────────────────────────────────────────────────────────
#   usuario           :8001    :5001   postgres-usuario        :5437
#   suscripcion       :8002    :50052  postgres-suscripcion    :5438
#   catalogo           —       :5003   postgres-catalogo       :5433
#   streaming          —       :5004   postgres-streaming      :5434
#   cobros             —       :5006   postgres-cobros         :5436
#   notificaciones     —       :5007   postgres-notificaciones :5439
#
#   Variables requeridas en .env:
#     DB_PASSWORD   — contraseña de producción para el usuario "quetzal"
#     JWT_SECRET    — clave secreta para firmar/verificar JWT
#     EMAIL_USER    — cuenta de correo SMTP
#     EMAIL_PASS    — contraseña o app-password del correo
#     EMAIL_FROM    — dirección remitente
#     FX_API_URL    — (opcional) URL de la API de tipos de cambio
#                     por defecto: https://open.er-api.com/v6/latest
#
#   Levantar todo:      docker compose -f docker-compose.cloud.yml up -d --build
#   Ver logs:           docker compose -f docker-compose.cloud.yml logs -f
#   Detener todo:       docker compose -f docker-compose.cloud.yml down

services:

  # ════════════════════════════════════════════════════════════════════════════
  # USUARIO  (Python · FastAPI + gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  postgres-usuario:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quetzal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: usuario_db
    volumes:
      - pg_usuario_data:/var/lib/postgresql/data
      - ./backend/services/usuario/database/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quetzal -d usuario_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  usuario:
    build:
      context: ./backend/services/usuario
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      STORAGE_BACKEND: postgres
      DB_HOST: postgres-usuario
      DB_PORT: "5432"
      DB_NAME: usuario_db
      DB_USER: quetzal
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GRPC_PORT: "5001"
    ports:
      - "8001:8001"
      - "5001:5001"
    depends_on:
      postgres-usuario:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  # SUSCRIPCIÓN  (Python · FastAPI + gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  postgres-suscripcion:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quetzal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: suscripcion_db
    volumes:
      - pg_suscripcion_data:/var/lib/postgresql/data
      - ./backend/services/suscripcion/database/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quetzal -d suscripcion_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  suscripcion:
    build:
      context: ./backend/services/suscripcion
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres-suscripcion
      DB_PORT: "5432"
      DB_NAME: suscripcion_db
      DB_USER: quetzal
      DB_PASSWORD: ${DB_PASSWORD}
      GRPC_PORT: "50052"
    ports:
      - "8002:8002"
      - "50052:50052"
    depends_on:
      postgres-suscripcion:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  # CATÁLOGO  (Go · gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  postgres-catalogo:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quetzal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: catalogo_db
    volumes:
      - pg_catalogo_data:/var/lib/postgresql/data
      - ./backend/services/catalogo/database/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quetzal -d catalogo_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  catalogo:
    build:
      context: ./backend
      dockerfile: services/catalogo/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:${DB_PASSWORD}@postgres-catalogo:5432/catalogo_db?sslmode=disable
      GRPC_PORT: "5003"
    ports:
      - "5003:5003"
    depends_on:
      postgres-catalogo:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  # STREAMING  (Go · gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  postgres-streaming:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quetzal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: streaming_db
    volumes:
      - pg_streaming_data:/var/lib/postgresql/data
      - ./backend/services/streaming/database/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quetzal -d streaming_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  streaming:
    build:
      context: ./backend
      dockerfile: services/streaming/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:${DB_PASSWORD}@postgres-streaming:5432/streaming_db?sslmode=disable
      GRPC_PORT: "5004"
    ports:
      - "5004:5004"
    depends_on:
      postgres-streaming:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  # INFRAESTRUCTURA COMPARTIDA
  # ════════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ════════════════════════════════════════════════════════════════════════════
  # COBROS  (TypeScript · gRPC)
  #   Servicio financiero: procesa pagos, convierte divisas via API externa
  #   y cachea los tipos de cambio en Redis con TTL.
  # ════════════════════════════════════════════════════════════════════════════

  postgres-cobros:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quetzal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cobros_db
    volumes:
      - pg_cobros_data:/var/lib/postgresql/data
      - ./backend/services/cobros/database/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quetzal -d cobros_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  cobros:
    build:
      context: ./backend
      dockerfile: services/cobros/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:${DB_PASSWORD}@postgres-cobros:5432/cobros_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      FX_API_URL: ${FX_API_URL:-https://open.er-api.com/v6/latest}
      GRPC_PORT: "5006"
    ports:
      - "5006:5006"
    depends_on:
      postgres-cobros:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  # NOTIFICACIONES  (TypeScript · gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  postgres-notificaciones:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quetzal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: notificaciones_db
    volumes:
      - pg_notificaciones_data:/var/lib/postgresql/data
      - ./backend/services/notificaciones/database/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quetzal -d notificaciones_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  notificaciones:
    build:
      context: ./backend
      dockerfile: services/notificaciones/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:${DB_PASSWORD}@postgres-notificaciones:5432/notificaciones_db?sslmode=disable
      GRPC_PORT: "5007"
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "5007:5007"
    depends_on:
      postgres-notificaciones:
        condition: service_healthy

# ════════════════════════════════════════════════════════════════════════════
# VOLÚMENES — uno por base de datos
# ════════════════════════════════════════════════════════════════════════════

volumes:
  pg_usuario_data:
  pg_suscripcion_data:
  pg_catalogo_data:
  pg_streaming_data:
  pg_cobros_data:
  pg_notificaciones_data:
