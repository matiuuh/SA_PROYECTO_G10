    restart: unless-stopped
    command: ["postgres", "-c", "timezone=America/Guatemala"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: quetzal_streaming
    volumes:
      - pg_streaming_data:/var/lib/postgresql/data
      - ./backend/services/streaming/database/sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/services/streaming/database/sql/02_procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quetzal_streaming"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ════════════════════════════════════════════════════════════════════════════
  # DIVISAS
  # ════════════════════════════════════════════════════════════════════════════

  postgres-divisas:
