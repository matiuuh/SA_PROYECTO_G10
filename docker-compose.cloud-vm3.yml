      - pg_notificaciones_data:/var/lib/postgresql/data
      - ./backend/services/notificaciones/database/sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quetzal_notificaciones"]
      interval: 10s
      timeout: 5s
      retries: 10

# ════════════════════════════════════════════════════════════════════════════
# VOLÚMENES — persistencia de cada base de datos
# ════════════════════════════════════════════════════════════════════════════

volumes:
  pg_usuario_data:
  pg_suscripcion_data:
  pg_catalogo_data:
  pg_streaming_data:
  pg_divisas_data:
  pg_cobros_data:
  pg_notificaciones_data:
