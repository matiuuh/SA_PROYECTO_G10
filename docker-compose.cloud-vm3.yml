      POSTGRES_DB: quetzal_divisas
    volumes:
      - pg_divisas_data:/var/lib/postgresql/data
      - ./backend/services/divisas/database/sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/services/divisas/database/sql/02_procedures.sql:/docker-entrypoint-initdb.d/02_procedures.sql:ro
