name: quetzaltv-databases

# ─── VM3 — Bases de datos ──────────────────────────────────────────────────────
#   Contiene los seis PostgreSQL del proyecto (Database per Microservice).
#   Los servicios en VM1/VM2 se conectan usando la IP interna de esta VM.
#
#   DB                     Puerto expuesto en VM3
#   ────────────────────────────────────────────
#   postgres-usuario        5437
#   postgres-suscripcion    5438
#   postgres-catalogo       5433
#   postgres-streaming      5434
#   postgres-cobros         5436
#   postgres-notificaciones 5439
#
#   Variables requeridas en .env (en esta VM):
#     DB_PASSWORD   — contraseña de producción para el usuario "quetzal"
#
#   GCP: los puertos 5433-5439 deben abrirse solo a las IPs internas de VM1 y VM2
#        mediante reglas de firewall en la VPC. No exponer a internet.
#
#   Levantar: docker compose -f docker-compose.cloud-vm3.yml up -d

services:

  # ════════════════════════════════════════════════════════════════════════════
  # USUARIO
  # ════════════════════════════════════════════════════════════════════════════

  postgres-usuario:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quetzal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: usuario_db
    volumes:
      - pg_usuario_data:/var/lib/postgresql/data
      - ./backend/services/usuario/database/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quetzal -d usuario_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ════════════════════════════════════════════════════════════════════════════
  # SUSCRIPCIÓN
  # ════════════════════════════════════════════════════════════════════════════

  postgres-suscripcion:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quetzal
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: suscripcion_db
    volumes:
      - pg_suscripcion_data:/var/lib/postgresql/data
      - ./backend/services/suscripcion/database/sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quetzal -d suscripcion_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ════════════════════════════════════════════════════════════════════════════
  # CATÁLOGO
  # ════════════════════════════════════════════════════════════════════════════

  postgres-catalogo:
    image: postgres:16-alpine
    restart: unless-stopped
