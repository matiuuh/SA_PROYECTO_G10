# ════════════════════════════════════════════════════════════════════════════
# VOLÚMENES
# ════════════════════════════════════════════════════════════════════════════

volumes:
  pg_usuario_data:
  pg_suscripcion_data:
  pg_catalogo_data:
  pg_streaming_data:
  pg_cobros_data:
  pg_notificaciones_data:
