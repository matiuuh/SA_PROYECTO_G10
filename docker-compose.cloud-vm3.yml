      - ./backend/services/cobros/database/sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quetzal_cobros"]
