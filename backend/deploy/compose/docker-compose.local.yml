services:
  postgres:
    image: postgres:16
    container_name: quetzal-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/00-create-multiple-dbs.sh:/docker-entrypoint-initdb.d/00-create-multiple-dbs.sh:ro
      - ../../services/usuario/database/sql/01_usuarios.sql:/docker-entrypoint-initdb.d/10-usuarios.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quetzal-redis-local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  usuario-service:
    build:
      context: ../../services/usuario
      dockerfile: Dockerfile
    container_name: quetzal-usuario-service-local
    restart: unless-stopped
    environment:
      APP_NAME: usuario-service
      APP_ENV: development
      APP_PORT: 8001
      STORAGE_BACKEND: postgres
      JWT_SECRET: change-me-local
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: quetzal_usuario
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
