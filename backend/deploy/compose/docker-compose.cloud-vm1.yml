name: quetzaltv-vm1

# ─── VM1: Usuarios · Suscripción · Catálogo ───────────────────────────────────
#
#   Esta VM no aloja bases de datos ni Redis.
#   Las BDs viven en VM3 y se alcanzan por IP interna de GCP.
#   Los servicios de VM2 (divisas, notificaciones) se alcanzan por VM2_HOST.
#
#   Variables de entorno requeridas en .env de esta VM:
#     DB_VM3_HOST   — IP interna de VM3
#     VM2_HOST      — IP interna de VM2
#     VM4_HOST      — IP interna/pública de VM4 (api-gateway)
#     DB_PASSWORD   — contraseña compartida de postgres
#     JWT_SECRET    — clave de firma JWT
#
#   Requiere además /opt/quetzaltv/secrets/gcs-key.json (key de la SA
#   quetzal-tv-storage@sa-proyecto-g10.iam.gserviceaccount.com) montada por
#   cd-develop.yml antes del up, para que catalogo-service pueda firmar
#   URLs V4 de GCS.
#
#   Levantar:  docker compose -f docker-compose.cloud-vm1.yml up --build -d
#   Detener:   docker compose -f docker-compose.cloud-vm1.yml down

services:

  # ════════════════════════════════════════════════════════════════════════════
  # USUARIO  (Python · FastAPI + gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  usuario-service:
    image: ${AR_REGISTRY:-quetzaltv}/usuario:${IMAGE_TAG:-latest}
    container_name: quetzal-usuario-service
    restart: unless-stopped
    environment:
      APP_NAME: usuario-service
      APP_ENV: production
      APP_PORT: 8001
      GRPC_PORT: 5001
      NOTIFICATIONS_ENABLED: "true"
      API_GATEWAY_URL: http://${VM4_HOST}:80
      NOTIFICATIONS_TIMEOUT_SECONDS: 3.0
      STORAGE_BACKEND: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      DB_HOST: ${DB_VM3_HOST}
      DB_PORT: 5437
      DB_NAME: quetzal_usuario
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8001:8001"
      - "5001:5001"

  # Tarea programada de mantenimiento para develop.
  # Se ejecuta en VM1 y se conecta al PostgreSQL de usuarios alojado en VM3.
  depuracion-usuarios:
    image: postgres:16-alpine
    container_name: quetzal-depuracion-usuarios
    restart: unless-stopped
    environment:
      PGHOST: ${DB_VM3_HOST}
      PGPORT: 5437
      PGDATABASE: quetzal_usuario
      PGUSER: postgres
      PGPASSWORD: ${DB_PASSWORD}
      PGCONNECT_TIMEOUT: 10
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu

        cat > /tmp/depuracion.sql <<'SQL'
        BEGIN;

        SELECT pg_advisory_xact_lock(hashtext('depuracion-usuarios'));

        CREATE TEMP TABLE cuentas_inactivas ON COMMIT DROP AS
        SELECT c.id
        FROM usuarios.cuentas AS c
        LEFT JOIN usuarios.sesiones AS s
          ON s.cuenta_id = c.id
        WHERE c.eliminado_en IS NULL
          AND c.rol <> 'administrador'
          AND NOT EXISTS (
            SELECT 1 FROM usuarios.sesiones s_activa
            WHERE s_activa.cuenta_id = c.id
              AND s_activa.cerrada_en IS NULL
              AND s_activa.expira_en > NOW()
          )
        GROUP BY c.id, c.creado_en
        HAVING COALESCE(MAX(s.iniciada_en), c.creado_en)
          < NOW() - INTERVAL '5 minutes';

        WITH cuentas_eliminadas AS (
          DELETE FROM usuarios.cuentas
          WHERE id IN (SELECT id FROM cuentas_inactivas)
          RETURNING id
        )
        SELECT COUNT(*) AS cuentas_eliminadas
        FROM cuentas_eliminadas;

        COMMIT;
        SQL

        echo '#!/bin/sh' > /tmp/run.sh
        echo "export PGHOST=$$PGHOST" >> /tmp/run.sh
        echo "export PGPORT=$$PGPORT" >> /tmp/run.sh
        echo "export PGDATABASE=$$PGDATABASE" >> /tmp/run.sh
        echo "export PGUSER=$$PGUSER" >> /tmp/run.sh
        echo "export PGPASSWORD=$$PGPASSWORD" >> /tmp/run.sh
        echo "export PGCONNECT_TIMEOUT=$${PGCONNECT_TIMEOUT:-10}" >> /tmp/run.sh
        echo 'psql -v ON_ERROR_STOP=1 -f /tmp/depuracion.sql' >> /tmp/run.sh
        chmod +x /tmp/run.sh
        echo '* * * * * /tmp/run.sh >> /proc/1/fd/1 2>> /proc/1/fd/2' > /etc/crontabs/root
        echo "Depurador configurado: ejecucion cada minuto."
        exec crond -f -l 2

  # ════════════════════════════════════════════════════════════════════════════
  # SUSCRIPCIÓN  (Python · FastAPI + gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  suscripcion-service:
    image: ${AR_REGISTRY:-quetzaltv}/suscripcion:${IMAGE_TAG:-latest}
    container_name: quetzal-suscripcion-service
    restart: unless-stopped
    environment:
      APP_NAME: suscripcion-service
      APP_ENV: production
      APP_PORT: 8002
      GRPC_PORT: 5002
      API_GATEWAY_URL: http://${VM4_HOST}:80
      CONVERSION_TIMEOUT_SECONDS: 3.0
      STORAGE_BACKEND: postgres
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: ${DB_VM3_HOST}
      DB_PORT: 5438
      DB_NAME: quetzal_suscripcion
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8002:8002"
      - "5002:5002"

  # ════════════════════════════════════════════════════════════════════════════
  # CATÁLOGO  (Go · gRPC + HTTP)
  # ════════════════════════════════════════════════════════════════════════════

  catalogo-service:
    image: ${AR_REGISTRY:-quetzaltv}/catalogo:${IMAGE_TAG:-latest}
    container_name: quetzal-catalogo-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@${DB_VM3_HOST}:5433/quetzal_catalogo?sslmode=disable
      GRPC_PORT: 5003
      HTTP_PORT: 8003
      JWT_SECRET: ${JWT_SECRET}
      SUBSCRIPCION_API_URL: http://${VM4_HOST}:80/api/suscripcion
      USUARIO_API_URL: http://${VM4_HOST}:80/api/usuario
      API_GATEWAY_URL: http://${VM4_HOST}:80
      NOTIFICACIONES_GRPC_TARGET: ${VM2_HOST}:5007
      GCS_BUCKET: quetzaltv-streaming-g10
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcs-key.json
    volumes:
      - /opt/quetzaltv/secrets/gcs-key.json:/run/secrets/gcs-key.json:ro
    ports:
      - "5003:5003"
      - "8003:8003"
