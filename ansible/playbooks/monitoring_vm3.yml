---
- name: Instalar monitoreo seguro en VM3
  hosts: vm_db
  become: true

  vars:
    node_exporter_version: "1.8.2"
    node_exporter_archive: "node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    node_exporter_dir: "node_exporter-{{ node_exporter_version }}.linux-amd64"

  tasks:
    - name: Crear usuario de sistema para node_exporter
      user:
        name: node_exporter
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Descargar node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/{{ node_exporter_archive }}"
        dest: "/tmp/{{ node_exporter_archive }}"
        mode: "0644"

    - name: Extraer node_exporter
      unarchive:
        src: "/tmp/{{ node_exporter_archive }}"
        dest: /tmp
        remote_src: true
        creates: "/tmp/{{ node_exporter_dir }}/node_exporter"

    - name: Instalar binario de node_exporter
      copy:
        src: "/tmp/{{ node_exporter_dir }}/node_exporter"
        dest: /usr/local/bin/node_exporter
        remote_src: true
        owner: root
        group: root
        mode: "0755"

    - name: Instalar servicio systemd de node_exporter
      copy:
        dest: /etc/systemd/system/node_exporter.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          Wants=network-online.target
          After=network-online.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter --web.listen-address=:9100
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Habilitar y arrancar node_exporter
      systemd:
        name: node_exporter
        daemon_reload: true
        enabled: true
        state: started
