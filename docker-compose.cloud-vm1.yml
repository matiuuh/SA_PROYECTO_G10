name: quetzaltv-vm1

# ─── VM1 — Servicios: usuario · suscripcion · catalogo ────────────────────────
#   Las bases de datos viven en VM3. Cada servicio se conecta usando la IP
#   interna de VM3 y el puerto expuesto por el contenedor correspondiente.
#
#   Servicio       REST     gRPC    DB en VM3 (puerto)
#   ────────────────────────────────────────────────────
#   usuario        :8001    :5001   postgres-usuario     (5437)
#   suscripcion    :8002    :50052  postgres-suscripcion (5438)
#   catalogo        —       :5003   postgres-catalogo    (5433)
#
#   Variables requeridas en .env (en esta VM):
#     DB_VM3_HOST  — IP interna de VM3 en GCP (ej. 10.128.0.X)
#     DB_PASSWORD  — contraseña del usuario "quetzal" en PostgreSQL
#     JWT_SECRET   — clave secreta para firmar/verificar JWT
#
#   Levantar: docker compose -f docker-compose.cloud-vm1.yml up -d --build
#
#   Nota: no hay depends_on hacia las BDs porque están en otra VM.
#         Los servicios deben manejar reintentos de conexión en su arranque.

services:

  # ════════════════════════════════════════════════════════════════════════════
  # USUARIO  (Python · FastAPI + gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  usuario:
    build:
      context: ./backend/services/usuario
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      STORAGE_BACKEND: postgres
      DB_HOST: ${DB_VM3_HOST}
      DB_PORT: "5437"
      DB_NAME: usuario_db
      DB_USER: quetzal
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GRPC_PORT: "5001"
    ports:
      - "8001:8001"
      - "5001:5001"

  # ════════════════════════════════════════════════════════════════════════════
  # SUSCRIPCIÓN  (Python · FastAPI + gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  suscripcion:
    build:
      context: ./backend/services/suscripcion
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: ${DB_VM3_HOST}
      DB_PORT: "5438"
      DB_NAME: suscripcion_db
      DB_USER: quetzal
      DB_PASSWORD: ${DB_PASSWORD}
      GRPC_PORT: "50052"
    ports:
      - "8002:8002"
      - "50052:50052"

  # ════════════════════════════════════════════════════════════════════════════
  # CATÁLOGO  (Go · gRPC)
  # ════════════════════════════════════════════════════════════════════════════

  catalogo:
    build:
      context: ./backend
      dockerfile: services/catalogo/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:${DB_PASSWORD}@${DB_VM3_HOST}:5433/catalogo_db?sslmode=disable
      GRPC_PORT: "5003"
    ports:
      - "5003:5003"
