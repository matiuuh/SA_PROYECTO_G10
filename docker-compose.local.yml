name: quetzaltv-local

# ─── Servicios activos en esta fase ───────────────────────────────────────────
#   postgres       — instancia única con una DB por microservicio (patrón dev)
#   redis          — caché compartido (TTL requerido por servicio divisas)
#   usuario        — Python / gRPC :5001  + REST :8001
#   suscripcion    — Python / gRPC :50052 + REST :8002
#   catalogo       — Go / gRPC  :5003
#   streaming      — Go / gRPC  :5004
#   divisas        — TypeScript / gRPC  :5005
#   cobros         — TypeScript / gRPC  :5006
#   notificaciones — TypeScript / gRPC  :5007
#
# Levantar todo:          docker compose -f docker-compose.local.yml up --build
# Solo la DB:             docker compose -f docker-compose.local.yml up postgres
# Reconstruir un servicio: docker compose -f docker-compose.local.yml up --build catalogo

services:

  # ─── Base de datos ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quetzal
      POSTGRES_PASSWORD: quetzal
      POSTGRES_DB: quetzal
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Script de init: crea las DBs y aplica los schemas en orden
      - ./backend/infra/postgres/init.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
      - ./backend/services/catalogo/database/sql:/docker-entrypoint-initdb.d/catalogo:ro
      - ./backend/services/streaming/database/sql:/docker-entrypoint-initdb.d/streaming:ro
      - ./backend/services/divisas/database/sql:/docker-entrypoint-initdb.d/divisas:ro
      - ./backend/services/cobros/database/sql:/docker-entrypoint-initdb.d/cobros:ro
      - ./backend/services/notificaciones/database/sql:/docker-entrypoint-initdb.d/notificaciones:ro
      - ./backend/services/usuario/database/sql:/docker-entrypoint-initdb.d/usuario:ro
      - ./backend/services/suscripcion/database/sql:/docker-entrypoint-initdb.d/suscripcion:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U quetzal -d catalogo_db && pg_isready -U quetzal -d streaming_db && pg_isready -U quetzal -d divisas_db && pg_isready -U quetzal -d cobros_db && pg_isready -U quetzal -d notificaciones_db && pg_isready -U quetzal -d usuario_db && pg_isready -U quetzal -d suscripcion_db
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Usuario ────────────────────────────────────────────────────────────────
  usuario:
    build:
      # El Dockerfile hace COPY requirements.txt y COPY app/, así que el context
      # debe ser el directorio del servicio directamente.
      context: ./backend/services/usuario
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      STORAGE_BACKEND: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: usuario_db
      DB_USER: quetzal
      DB_PASSWORD: quetzal
      JWT_SECRET: quetzal-dev-secret-change-in-prod
      GRPC_PORT: "5001"
    ports:
      - "8001:8001"   # REST / FastAPI
      - "5001:5001"   # gRPC
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Suscripción ────────────────────────────────────────────────────────────
  suscripcion:
    build:
      context: ./backend/services/suscripcion
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: suscripcion_db
      DB_USER: quetzal
      DB_PASSWORD: quetzal
      GRPC_PORT: "50052"
    ports:
      - "8002:8002"    # REST / FastAPI
      - "50052:50052"  # gRPC
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Catálogo ───────────────────────────────────────────────────────────────
  catalogo:
    build:
      # El context es backend/ para que el Dockerfile pueda copiar proto/ y services/
      context: ./backend
      dockerfile: services/catalogo/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:quetzal@postgres:5432/catalogo_db?sslmode=disable
      GRPC_PORT: "5003"
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Streaming ──────────────────────────────────────────────────────────────
  streaming:
    build:
      context: ./backend
      dockerfile: services/streaming/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:quetzal@postgres:5432/streaming_db?sslmode=disable
      GRPC_PORT: "5004"
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Divisas ────────────────────────────────────────────────────────────────
  divisas:
    build:
      context: ./backend
      dockerfile: services/divisas/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:quetzal@postgres:5432/divisas_db?sslmode=disable
      REDIS_URL: redis://redis:6379
      GRPC_PORT: "5005"
    ports:
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Cobros ─────────────────────────────────────────────────────────────────
  cobros:
    build:
      context: ./backend
      dockerfile: services/cobros/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:quetzal@postgres:5432/cobros_db?sslmode=disable
      GRPC_PORT: "5006"
    ports:
      - "5006:5006"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Notificaciones ─────────────────────────────────────────────────────────
  notificaciones:
    build:
      context: ./backend
      dockerfile: services/notificaciones/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://quetzal:quetzal@postgres:5432/notificaciones_db?sslmode=disable
      GRPC_PORT: "5007"
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    ports:
      - "5007:5007"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
