name: CD — develop → GCE

# ─────────────────────────────────────────────────────────────────────────────
# Se dispara en cada push a develop. Orden de ejecución:
#
#   1. build-and-push   — Construye las 9 imágenes Docker y las sube a
#                         Artifact Registry con la etiqueta develop-<SHA>.
#   2. backup-databases — (paralelo con build-and-push)
#                         SSH a VM3, vuelca las 7 BDs a GCS.
#   3. deploy-vm1       — (espera a 1 y 2) SSH a VM1, pull + restart.
#   4. deploy-vm2       — (espera a 1 y 2) SSH a VM2, pull + restart.
#   5. deploy-vm4       — (espera a 1 y 2) SSH a VM4, pull + restart.
#
# Secrets requeridos en el repositorio:
#   GCP_PROJECT_ID      — ID del proyecto GCP
#   GCP_SA_KEY          — JSON de cuenta de servicio (AR Writer + GCE access)
#   AR_REGION           — Región de Artifact Registry  (ej. us-central1)
#   GCS_BACKUP_BUCKET   — Nombre del bucket para backups (sin gs://)
#   VM1_HOST            — IP externa de VM1
#   VM2_HOST            — IP externa de VM2
#   VM3_HOST            — IP externa de VM3
#   VM4_HOST            — IP externa de VM4
#   VM_USER             — Usuario SSH en las VMs (ej. sa_deploy)
#   VM_SSH_KEY          — Clave privada SSH (RSA/ED25519)
#   DB_PASSWORD         — Contraseña de PostgreSQL (para pg_dump)
#   GCS_SA_KEY          — JSON de la SA quetzal-tv-storage (firma URLs V4 en
#                         catalogo-service/streaming-service en VM1/VM2)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [develop]

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # GUARDIA: solo un paso informativo (el gate de CI lo garantiza el workflow
  # de CI separado; aquí desplegamos en cuanto el push llega a develop).
  # ════════════════════════════════════════════════════════════════════════════

  ci-passed:
    name: "Verificar rama"
    runs-on: ubuntu-latest
    steps:
      - run: echo "Push a develop detectado — iniciando despliegue a GCE"

  # ════════════════════════════════════════════════════════════════════════════
  # 1. BUILD & PUSH — Construye todas las imágenes y las sube a Artifact Registry
  # ════════════════════════════════════════════════════════════════════════════

  build-and-push:
    name: "Build & Push → Artifact Registry"
    runs-on: ubuntu-latest
    needs: ci-passed

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ar_registry: ${{ steps.meta.outputs.registry }}

    steps:
      - uses: actions/checkout@v4

      - name: Calcular etiqueta de imagen
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="develop-${SHA}"
          REGISTRY="${{ secrets.AR_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/quetzaltv"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "Etiqueta: ${TAG}"
          echo "Registry: ${REGISTRY}"

      - name: Autenticar con GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.AR_REGION }}-docker.pkg.dev --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub (evitar rate limit en pulls de imágenes base)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Servicios Python ──────────────────────────────────────────────────

      - name: "Build & Push · usuario"
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/usuario
          file: ./backend/services/usuario/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.registry }}/usuario:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=usuario
          cache-to: type=gha,mode=max,scope=usuario

      - name: "Build & Push · suscripcion"
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/suscripcion
          file: ./backend/services/suscripcion/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.registry }}/suscripcion:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=suscripcion
          cache-to: type=gha,mode=max,scope=suscripcion

      # ── Servicios Go ─────────────────────────────────────────────────────
      # Contexto = backend/ porque el Dockerfile accede a proto/ y services/

      - name: "Build & Push · catalogo"
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/catalogo/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.registry }}/catalogo:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=catalogo
          cache-to: type=gha,mode=max,scope=catalogo

      - name: "Build & Push · streaming"
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/streaming/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.registry }}/streaming:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=streaming
          cache-to: type=gha,mode=max,scope=streaming

      # ── Servicios TypeScript ──────────────────────────────────────────────

      - name: "Build & Push · cobros"
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/cobros/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.registry }}/cobros:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=cobros
          cache-to: type=gha,mode=max,scope=cobros

      - name: "Build & Push · divisas"
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/divisas/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.registry }}/divisas:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=divisas
          cache-to: type=gha,mode=max,scope=divisas

      - name: "Build & Push · notificaciones"
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/notificaciones/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.registry }}/notificaciones:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=notificaciones
          cache-to: type=gha,mode=max,scope=notificaciones

      - name: "Build & Push · api-gateway"
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api-gateway
          file: ./backend/api-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.registry }}/api-gateway:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

      - name: "Build & Push · frontend"
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.registry }}/frontend:${{ steps.meta.outputs.tag }}
          build-args: |
            VITE_USUARIO_API_URL=/api/usuario
            VITE_SUSCRIPCION_API_URL=/api/suscripcion
            VITE_CATALOGO_API_URL=/api/catalogo
            VITE_STREAMING_API_URL=/api/streaming
            VITE_COBROS_API_URL=/api/cobros
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ════════════════════════════════════════════════════════════════════════════
  # 2. BACKUP DE BASES DE DATOS (paralelo con build-and-push)
  # SSH a VM3 → pg_dump de las 7 BDs → sube los dumps a GCS
  # ════════════════════════════════════════════════════════════════════════════

  backup-databases:
    name: "Backup de BDs → GCS"
    runs-on: ubuntu-latest
    needs: ci-passed
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar con GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Preparar clave SSH
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keyscan -H ${{ secrets.VM3_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ejecutar backup en VM3 vía SSH
        uses: appleboy/ssh-action@v1
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCS_BUCKET: ${{ secrets.GCS_BACKUP_BUCKET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AR_REGION: ${{ secrets.AR_REGION }}
        with:
          host: ${{ secrets.VM3_HOST }}
          username: ${{ secrets.VM_USER }}
          key_path: /tmp/deploy_key
          envs: GCP_SA_KEY,GCS_BUCKET,DB_PASSWORD,AR_REGION
          script: |
            set -e
            DATE=$(date +%Y%m%d_%H%M%S)

            # Autenticar gcloud con la cuenta de servicio
            echo "${GCP_SA_KEY}" > /tmp/sa-key.json
            gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
            rm /tmp/sa-key.json

            echo "=== Iniciando backup de bases de datos: ${DATE} ==="

            backup_db() {
              local DB_NAME=$1
              local CONTAINER=$2
              local DUMP_FILE="/tmp/backup_${DB_NAME}_${DATE}.sql.gz"

              echo "→ Respaldando ${DB_NAME} desde ${CONTAINER}..."
              docker exec "${CONTAINER}" pg_dump -U postgres "${DB_NAME}" \
                | gzip > "${DUMP_FILE}"
              gsutil cp "${DUMP_FILE}" "gs://${GCS_BUCKET}/backups/${DATE}/${DB_NAME}.sql.gz"
              rm "${DUMP_FILE}"
              echo "  ✓ ${DB_NAME} → gs://${GCS_BUCKET}/backups/${DATE}/${DB_NAME}.sql.gz"
            }

            backup_db "quetzal_usuario"        "quetzal-postgres-usuario"
            backup_db "quetzal_suscripcion"    "quetzal-postgres-suscripcion"
            backup_db "quetzal_catalogo"       "quetzal-postgres-catalogo"
            backup_db "quetzal_streaming"      "quetzal-postgres-streaming"
            backup_db "quetzal_divisas"        "quetzal-postgres-divisas"
            backup_db "quetzal_cobros"         "quetzal-postgres-cobros"
            backup_db "quetzal_notificaciones" "quetzal-postgres-notificaciones"

            echo "=== Backup completo: ${DATE} ==="

  # ════════════════════════════════════════════════════════════════════════════
  # 3–5. DESPLIEGUE A VMs — espera que build y backup terminen
  # ════════════════════════════════════════════════════════════════════════════

  deploy-vm1:
    name: "Deploy → VM1 (usuario · suscripcion · catalogo)"
    runs-on: ubuntu-latest
    needs: [build-and-push, backup-databases]
    steps:
      - uses: actions/checkout@v4

      - name: Preparar clave SSH
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keyscan -H ${{ secrets.VM1_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copiar compose file actualizado a VM1
        run: |
          scp -i /tmp/deploy_key \
            backend/deploy/compose/docker-compose.cloud-vm1.yml \
            ${{ secrets.VM_USER }}@${{ secrets.VM1_HOST }}:/opt/quetzaltv/backend/deploy/compose/docker-compose.cloud-vm1.yml

      - name: SSH a VM1 → pull + restart
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          AR_REGION: ${{ secrets.AR_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCS_SA_KEY: ${{ secrets.GCS_SA_KEY }}
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.VM_USER }}
          key_path: /tmp/deploy_key
          envs: IMAGE_TAG,GCP_SA_KEY,AR_REGION,GCP_PROJECT_ID,GCS_SA_KEY
          script: |
            set -e

            # Reconstruir la URL del registry a partir de partes simples
            AR_REGISTRY="${AR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/quetzaltv"

            # Autenticar Docker con Artifact Registry
            echo "${GCP_SA_KEY}" | docker login \
              -u _json_key --password-stdin \
              "${AR_REGION}-docker.pkg.dev"

            cd /opt/quetzaltv

            # Env file explícito con la URL del registry y el tag actuales
            DEPLOY_ENV="/tmp/quetzaltv-vm1-$$.env"
            grep -v "^AR_REGISTRY=\|^IMAGE_TAG=" backend/deploy/compose/.env > "${DEPLOY_ENV}" 2>/dev/null || true
            echo "AR_REGISTRY=${AR_REGISTRY}" >> "${DEPLOY_ENV}"
            echo "IMAGE_TAG=${IMAGE_TAG}"     >> "${DEPLOY_ENV}"

            # Key de quetzal-tv-storage para que catalogo-service firme URLs V4 de GCS
            mkdir -p secrets
            echo "${GCS_SA_KEY}" > secrets/gcs-key.json
            chmod 600 secrets/gcs-key.json

            docker compose -f backend/deploy/compose/docker-compose.cloud-vm1.yml \
              --env-file "${DEPLOY_ENV}" pull
            docker compose -f backend/deploy/compose/docker-compose.cloud-vm1.yml \
              --env-file "${DEPLOY_ENV}" up -d --force-recreate

            rm -f "${DEPLOY_ENV}"
            echo "✓ VM1 actualizada: ${AR_REGISTRY}/usuario:${IMAGE_TAG}"

  deploy-vm2:
    name: "Deploy → VM2 (streaming · cobros · divisas · notificaciones)"
    runs-on: ubuntu-latest
    needs: [build-and-push, backup-databases]
    steps:
      - uses: actions/checkout@v4

      - name: Preparar clave SSH
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keyscan -H ${{ secrets.VM2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copiar compose file actualizado a VM2
        run: |
          scp -i /tmp/deploy_key \
            backend/deploy/compose/docker-compose.cloud-vm2.yml \
            ${{ secrets.VM_USER }}@${{ secrets.VM2_HOST }}:/opt/quetzaltv/backend/deploy/compose/docker-compose.cloud-vm2.yml

      - name: SSH a VM2 → pull + restart
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          AR_REGION: ${{ secrets.AR_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCS_SA_KEY: ${{ secrets.GCS_SA_KEY }}
        with:
          host: ${{ secrets.VM2_HOST }}
          username: ${{ secrets.VM_USER }}
          key_path: /tmp/deploy_key
          envs: IMAGE_TAG,GCP_SA_KEY,AR_REGION,GCP_PROJECT_ID,GCS_SA_KEY
          script: |
            set -e

            AR_REGISTRY="${AR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/quetzaltv"

            echo "${GCP_SA_KEY}" | docker login \
              -u _json_key --password-stdin \
              "${AR_REGION}-docker.pkg.dev"

            cd /opt/quetzaltv

            DEPLOY_ENV="/tmp/quetzaltv-vm2-$$.env"
            grep -v "^AR_REGISTRY=\|^IMAGE_TAG=" backend/deploy/compose/.env > "${DEPLOY_ENV}" 2>/dev/null || true
            echo "AR_REGISTRY=${AR_REGISTRY}" >> "${DEPLOY_ENV}"
            echo "IMAGE_TAG=${IMAGE_TAG}"     >> "${DEPLOY_ENV}"

            # Key de quetzal-tv-storage para que streaming-service firme URLs V4 de GCS
            mkdir -p secrets
            echo "${GCS_SA_KEY}" > secrets/gcs-key.json
            chmod 600 secrets/gcs-key.json

            docker compose -f backend/deploy/compose/docker-compose.cloud-vm2.yml \
              --env-file "${DEPLOY_ENV}" pull
            docker compose -f backend/deploy/compose/docker-compose.cloud-vm2.yml \
              --env-file "${DEPLOY_ENV}" up -d --force-recreate

            rm -f "${DEPLOY_ENV}"
            echo "✓ VM2 actualizada: ${AR_REGISTRY}/streaming:${IMAGE_TAG}"

  deploy-vm4:
    name: "Deploy → VM4 (api-gateway · frontend)"
    runs-on: ubuntu-latest
    needs: [build-and-push, backup-databases]
    steps:
      - uses: actions/checkout@v4

      - name: Preparar clave SSH
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keyscan -H ${{ secrets.VM4_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copiar compose file actualizado a VM4
        run: |
          scp -i /tmp/deploy_key \
            backend/deploy/compose/docker-compose.cloud-vm4.yml \
            ${{ secrets.VM_USER }}@${{ secrets.VM4_HOST }}:/opt/quetzaltv/backend/deploy/compose/docker-compose.cloud-vm4.yml

      - name: SSH a VM4 → pull + restart
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          AR_REGION: ${{ secrets.AR_REGION }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        with:
          host: ${{ secrets.VM4_HOST }}
          username: ${{ secrets.VM_USER }}
          key_path: /tmp/deploy_key
          envs: IMAGE_TAG,GCP_SA_KEY,AR_REGION,GCP_PROJECT_ID
          script: |
            set -e

            AR_REGISTRY="${AR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/quetzaltv"

            echo "${GCP_SA_KEY}" | docker login \
              -u _json_key --password-stdin \
              "${AR_REGION}-docker.pkg.dev"

            cd /opt/quetzaltv

            DEPLOY_ENV="/tmp/quetzaltv-vm4-$$.env"
            grep -v "^AR_REGISTRY=\|^IMAGE_TAG=" backend/deploy/compose/.env > "${DEPLOY_ENV}" 2>/dev/null || true
            echo "AR_REGISTRY=${AR_REGISTRY}" >> "${DEPLOY_ENV}"
            echo "IMAGE_TAG=${IMAGE_TAG}"     >> "${DEPLOY_ENV}"

            docker compose -f backend/deploy/compose/docker-compose.cloud-vm4.yml \
              --env-file "${DEPLOY_ENV}" pull
            docker compose -f backend/deploy/compose/docker-compose.cloud-vm4.yml \
              --env-file "${DEPLOY_ENV}" up -d --force-recreate

            rm -f "${DEPLOY_ENV}"
            echo "✓ VM4 actualizada: ${AR_REGISTRY}/frontend:${IMAGE_TAG}"